<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preenchimento de Ficha Cadastral</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
      background: #f6f7fb;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #dde1ea;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(20, 28, 45, 0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 22px;
    }
    p {
      margin-top: 0;
      color: #455066;
    }
    fieldset {
      border: 1px solid #dfe4ef;
      border-radius: 8px;
      margin: 0 0 16px;
      padding: 12px;
    }
    legend {
      padding: 0 6px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .col-2 { grid-column: span 2; }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      color: #2d3648;
    }
    input, select {
      border: 1px solid #cbd4e2;
      border-radius: 6px;
      padding: 8px;
      font-size: 14px;
    }
    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      color: #2d3648;
    }
    .checks label {
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #1f4ed8;
      color: #fff;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
    }
    button:disabled {
      background: #8aa2de;
      cursor: not-allowed;
    }
    .status {
      font-size: 13px;
      color: #2d3648;
      margin: 0;
    }
    .muted {
      color: #606d84;
      font-size: 12px;
    }
    @media (max-width: 840px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .col-3, .col-4 {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Ficha Cadastral (PDF original)</h1>
    <p>
      Preencha os dados abaixo e exporte o PDF usando exatamente o modelo
      <strong>Ficha_Cadastral_exemplo.pdf</strong> como base.
    </p>

    <form id="fichaForm">
      <fieldset>
        <legend>Dados Pessoais</legend>
        <div class="grid">
          <label class="col-3">Nome Completo
            <input name="nomeCompleto" required>
          </label>
          <label>Nome Social
            <input name="nomeSocial">
          </label>
          <label>Telefone
            <input name="telefone">
          </label>
          <label>Celular
            <input name="celular">
          </label>
          <label class="col-2">E-mail
            <input name="email" type="email">
          </label>
          <label class="col-2">Estado Civil
            <input name="estadoCivil">
          </label>
          <label>Primeiro Emprego
            <select name="primeiroEmprego">
              <option value="SIM">SIM</option>
              <option value="NÃO">NÃO</option>
            </select>
          </label>
          <label class="col-3">PIS
            <input name="pis">
          </label>
          <label class="col-2">Endereço
            <input name="endereco">
          </label>
          <label>Número
            <input name="numero">
          </label>
          <label>Complemento
            <input name="complemento">
          </label>
          <label>CEP
            <input name="cep">
          </label>
          <label>Bairro
            <input name="bairro">
          </label>
          <label class="col-2">Cidade
            <input name="cidade">
          </label>
          <label>Possui Deficiência
            <select name="possuiDeficiencia">
              <option value="SIM">SIM</option>
              <option value="NÃO">NÃO</option>
            </select>
          </label>
          <div class="col-3">
            <span class="muted">Tipo de Deficiência</span>
            <div class="checks">
              <label><input type="checkbox" name="tipoDeficiencia" value="FÍSICA">Física</label>
              <label><input type="checkbox" name="tipoDeficiencia" value="AUDITIVA">Auditiva</label>
              <label><input type="checkbox" name="tipoDeficiencia" value="VISUAL">Visual</label>
              <label><input type="checkbox" name="tipoDeficiencia" value="INTELECTUAL">Intelectual</label>
              <label><input type="checkbox" name="tipoDeficiencia" value="MÚLTIPLA">Múltipla</label>
            </div>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Dados Conta Bancária</legend>
        <div class="grid">
          <div class="col-4 checks">
            <label><input type="checkbox" name="contaMentore">Conta Mêntore</label>
            <label><input type="checkbox" name="contaSalarioBradesco">Conta Salário Bradesco</label>
          </div>
          <label class="col-2">Número do CPF
            <input name="cpfConta">
          </label>
          <label>Agência
            <input name="agencia">
          </label>
          <label>Conta/Dígito
            <input name="contaDigito">
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Dependentes</legend>
        <div id="dependentesContainer"></div>
      </fieldset>

      <fieldset>
        <legend>Benefícios</legend>
        <div class="grid">
          <label>Ônibus (Qtd.)
            <input name="onibusQtd">
          </label>
          <label>Ônibus (Valor Unitário)
            <input name="onibusValor">
          </label>
          <label>Metrô/Trem (Qtd.)
            <input name="metroQtd">
          </label>
          <label>Metrô/Trem (Valor Unitário)
            <input name="metroValor">
          </label>
          <label>Intermunicipal (Qtd.)
            <input name="interQtd">
          </label>
          <label>Intermunicipal (Valor Unitário)
            <input name="interValor">
          </label>
          <label class="col-4">Vale Refeição/Alimentação
            <select name="valeTipo">
              <option value="100_VA">100% Vale Alimentação</option>
              <option value="100_VR">100% Vale Refeição</option>
              <option value="FLEX">Flexibilizado (50% VR e 50% VA)</option>
            </select>
          </label>
        </div>
      </fieldset>

      <div class="actions">
        <button type="submit" id="gerarBtn" disabled>Gerar PDF preenchido</button>
        <p class="status" id="status">Carregando template...</p>
      </div>
      <div class="actions">
        <input id="templateFallback" type="file" accept="application/pdf" style="display:none">
      </div>
    </form>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const TEMPLATE_PATH = "./Ficha_Cadastral_exemplo.pdf";
    const statusEl = document.getElementById("status");
    const gerarBtn = document.getElementById("gerarBtn");
    const formEl = document.getElementById("fichaForm");
    const templateFallbackEl = document.getElementById("templateFallback");
    const dependentesContainer = document.getElementById("dependentesContainer");

    let templateBytes = null;
    let textLines = null;

    function clonarArrayBuffer(buffer) {
      return buffer.slice(0);
    }

    function criarCamposDependentes() {
      const fragment = document.createDocumentFragment();
      for (let i = 1; i <= 4; i += 1) {
        const wrap = document.createElement("div");
        wrap.className = "grid";
        wrap.style.marginBottom = "10px";
        wrap.innerHTML = `
          <label class="col-2">Nome do Dependente ${i}
            <input name="dep${i}Nome">
          </label>
          <label>Data de Nascimento
            <input name="dep${i}Nascimento" placeholder="dd/mm/aaaa">
          </label>
          <label>CPF do Dependente
            <input name="dep${i}Cpf">
          </label>
        `;
        fragment.appendChild(wrap);
      }
      dependentesContainer.appendChild(fragment);
    }

    function normalizarTexto(valor) {
      return (valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizarComparacao(valor) {
      return normalizarTexto(valor)
        .replace(/\s*([:;%/()\-])\s*/g, "$1");
    }

    async function construirLinhasTexto(pdfBytes) {
      const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);
      const textContent = await page.getTextContent();

      const itens = textContent.items
        .map((item) => ({
          str: item.str || "",
          norm: normalizarTexto(item.str),
          x: item.transform[4],
          y: item.transform[5],
          width: item.width || 0
        }))
        .filter((item) => item.norm.length > 0);

      const mapa = new Map();
      for (const item of itens) {
        const chave = String(Math.round(item.y));
        if (!mapa.has(chave)) {
          mapa.set(chave, []);
        }
        mapa.get(chave).push(item);
      }

      const linhas = Array.from(mapa.values())
        .map((items) => {
          const ordenados = items.sort((a, b) => a.x - b.x);
          return {
            items: ordenados,
            texto: ordenados.map((x) => x.norm).join(" ")
          };
        })
        .sort((a, b) => b.items[0].y - a.items[0].y);

      return linhas;
    }

    function paraArray(valor) {
      return Array.isArray(valor) ? valor : [valor];
    }

    function encontrarLinhaPorContexto(linhas, contexto, ocorrencia = 0) {
      const opcoes = paraArray(contexto).map(normalizarTexto);
      let total = 0;
      for (const linha of linhas) {
        if (opcoes.some((texto) => linha.texto.includes(texto))) {
          if (total === ocorrencia) {
            return linha;
          }
          total += 1;
        }
      }
      return null;
    }

    function encontrarFrase(linhas, frase, ocorrencia = 0) {
      const alvos = paraArray(frase).map(normalizarTexto);
      let count = 0;

      for (const alvo of alvos) {
        const alvoComparavel = normalizarComparacao(alvo);
        for (const linha of linhas) {
          const items = linha.items;
          for (let i = 0; i < items.length; i += 1) {
            let construido = "";
            for (let j = i; j < items.length; j += 1) {
              construido = construido ? `${construido} ${items[j].norm}` : items[j].norm;
              const construidoComparavel = normalizarComparacao(construido);
              if (construidoComparavel === alvoComparavel) {
                if (count === ocorrencia) {
                  return {
                    linha,
                    inicio: items[i],
                    fim: items[j],
                    x: items[i].x,
                    y: items[i].y,
                    right: items[j].x + items[j].width
                  };
                }
                count += 1;
              }
              if (!alvoComparavel.startsWith(construidoComparavel)) {
                break;
              }
            }
          }
        }
      }
      return null;
    }

    function encontrarFraseNaLinha(linha, frase, ocorrencia = 0) {
      const alvos = paraArray(frase).map(normalizarTexto);
      const items = linha.items;
      let count = 0;

      for (const alvo of alvos) {
        const alvoComparavel = normalizarComparacao(alvo);
        for (let i = 0; i < items.length; i += 1) {
          let construido = "";
          for (let j = i; j < items.length; j += 1) {
            construido = construido ? `${construido} ${items[j].norm}` : items[j].norm;
            const construidoComparavel = normalizarComparacao(construido);
            if (construidoComparavel === alvoComparavel) {
              if (count === ocorrencia) {
                return {
                  inicio: items[i],
                  fim: items[j],
                  right: items[j].x + items[j].width
                };
              }
              count += 1;
            }
            if (!alvoComparavel.startsWith(construidoComparavel)) {
              break;
            }
          }
        }
      }
      return null;
    }

    function escreverAposFrase(page, font, linhas, frase, valor, options = {}) {
      const texto = String(valor || "").trim();
      if (!texto) return;
      const found = encontrarFrase(linhas, frase, options.ocorrencia || 0);
      if (!found) return;

      page.drawText(texto, {
        x: found.right + (options.offsetX ?? 8),
        y: found.y + (options.offsetY ?? 0),
        size: options.size ?? 9,
        font,
        maxWidth: options.maxWidth ?? 220
      });
    }

    function escreverNaLinha(page, font, linhas, contextoLinha, valor, options = {}) {
      const texto = String(valor || "").trim();
      if (!texto) return;
      const linha = encontrarLinhaPorContexto(linhas, contextoLinha, options.ocorrenciaLinha || 0);
      if (!linha) return;

      page.drawText(texto, {
        x: options.x ?? (linha.items[0].x + 260),
        y: (linha.items[0].y) + (options.offsetY ?? 0),
        size: options.size ?? 9,
        font,
        maxWidth: options.maxWidth ?? 200
      });
    }

    function escreverNoMarcador(page, font, linhas, valor, options = {}) {
      const texto = String(valor || "").trim();
      if (!texto) return false;

      let linha = encontrarLinhaPorContexto(
        linhas,
        options.contextoLinha || options.ancoraLinha || options.ancora,
        options.ocorrenciaLinha || 0
      );
      if (!linha) return false;

      let anchor = options.ancora
        ? encontrarFraseNaLinha(linha, options.ancora, options.ocorrenciaAncora || 0)
        : null;
      if (!anchor && options.ancora) {
        const anchorGlobal = encontrarFrase(linhas, options.ancora, options.ocorrenciaAncora || 0);
        if (anchorGlobal) {
          linha = anchorGlobal.linha;
          anchor = {
            inicio: anchorGlobal.inicio,
            fim: anchorGlobal.fim,
            right: anchorGlobal.right
          };
        }
      }
      const linhaAbaixo = options.linhaAbaixo === true;
      const gapY = options.gapY ?? 13;
      const xPadrao = linhaAbaixo ? 4 : 8;
      const xBase = options.x ?? (
        anchor
          ? (linhaAbaixo ? anchor.inicio.x + (options.offsetX ?? xPadrao) : anchor.right + (options.offsetX ?? xPadrao))
          : linha.items[0].x + (options.offsetX ?? 0)
      );
      const yBase = linha.items[0].y + (options.offsetY ?? 0) - (linhaAbaixo ? gapY : 0);

      page.drawText(texto, {
        x: xBase,
        y: yBase,
        size: options.size ?? 9,
        font,
        maxWidth: options.maxWidth ?? 220
      });
      return true;
    }

    function escreverAcimaDoRotulo(page, font, linhas, valor, frase, options = {}) {
      const texto = String(valor || "").trim();
      if (!texto) return false;
      const anchor = encontrarFrase(linhas, frase, options.ocorrencia || 0);
      if (!anchor) return false;

      const size = options.size ?? 9;
      const larguraTexto = font.widthOfTextAtSize(texto, size);
      const centroRotuloX = (anchor.x + anchor.right) / 2;

      page.drawText(texto, {
        x: centroRotuloX - (larguraTexto / 2) + (options.offsetX ?? 0),
        y: anchor.y + (options.offsetY ?? 12),
        size,
        font,
        maxWidth: options.maxWidth ?? 330
      });
      return true;
    }

    function formatarTelefoneBR(valor) {
      const digitos = String(valor || "").replace(/\D/g, "");
      if (digitos.length === 11) {
        return `(${digitos.slice(0, 2)}) ${digitos.slice(2, 7)}-${digitos.slice(7)}`;
      }
      if (digitos.length === 10) {
        return `(${digitos.slice(0, 2)}) ${digitos.slice(2, 6)}-${digitos.slice(6)}`;
      }
      return String(valor || "").trim();
    }

    function marcarCheckbox(page, font, linhas, contextoLinha, palavra, ativo, options = {}) {
      if (!ativo) return false;
      const linha = encontrarLinhaPorContexto(linhas, contextoLinha, options.ocorrenciaLinha || 0);
      if (!linha) return false;

      const alvos = paraArray(palavra).map(normalizarTexto);
      const candidatos = linha.items.filter((item) => alvos.includes(item.norm));
      let item = candidatos[options.ocorrenciaPalavra || 0];
      if (!item) {
        const frase = encontrarFraseNaLinha(linha, palavra, options.ocorrenciaPalavra || 0);
        item = frase ? frase.inicio : null;
      }
      if (!item) return false;

      page.drawText("X", {
        x: item.x + (options.offsetX ?? -10),
        y: item.y + (options.offsetY ?? 0),
        size: options.size ?? 10,
        font
      });
      return true;
    }

    function marcarCheckboxPorFrase(page, font, linhas, frases, ativo, options = {}) {
      if (!ativo) return false;
      const anchor = encontrarFrase(linhas, frases, options.ocorrencia || 0);
      if (!anchor) return false;
      page.drawText("X", {
        x: anchor.inicio.x + (options.offsetX ?? -10),
        y: anchor.y + (options.offsetY ?? 0),
        size: options.size ?? 10,
        font
      });
      return true;
    }

    function dadosDoFormulario() {
      const fd = new FormData(formEl);
      const tipos = Array.from(formEl.querySelectorAll("input[name='tipoDeficiencia']:checked")).map((x) => x.value);

      return {
        nomeCompleto: fd.get("nomeCompleto") || "",
        nomeSocial: fd.get("nomeSocial") || "",
        telefone: formatarTelefoneBR(fd.get("telefone") || ""),
        celular: formatarTelefoneBR(fd.get("celular") || ""),
        email: fd.get("email") || "",
        estadoCivil: fd.get("estadoCivil") || "",
        primeiroEmprego: fd.get("primeiroEmprego") || "SIM",
        pis: fd.get("pis") || "",
        endereco: fd.get("endereco") || "",
        numero: fd.get("numero") || "",
        complemento: fd.get("complemento") || "",
        cep: fd.get("cep") || "",
        bairro: fd.get("bairro") || "",
        cidade: fd.get("cidade") || "",
        possuiDeficiencia: fd.get("possuiDeficiencia") || "NÃO",
        tiposDeficiencia: tipos,
        contaMentore: formEl.querySelector("input[name='contaMentore']").checked,
        contaSalarioBradesco: formEl.querySelector("input[name='contaSalarioBradesco']").checked,
        cpfConta: fd.get("cpfConta") || "",
        agencia: fd.get("agencia") || "",
        contaDigito: fd.get("contaDigito") || "",
        dependentes: [1, 2, 3, 4].map((idx) => ({
          nome: fd.get(`dep${idx}Nome`) || "",
          nascimento: fd.get(`dep${idx}Nascimento`) || "",
          cpf: fd.get(`dep${idx}Cpf`) || ""
        })),
        onibusQtd: fd.get("onibusQtd") || "",
        onibusValor: fd.get("onibusValor") || "",
        metroQtd: fd.get("metroQtd") || "",
        metroValor: fd.get("metroValor") || "",
        interQtd: fd.get("interQtd") || "",
        interValor: fd.get("interValor") || "",
        valeTipo: fd.get("valeTipo") || "100_VA"
      };
    }

    async function carregarTemplateInicial() {
      try {
        const res = await fetch(TEMPLATE_PATH);
        if (!res.ok) {
          throw new Error("Template não encontrado no mesmo diretório.");
        }
        const fetchedBytes = await res.arrayBuffer();
        templateBytes = clonarArrayBuffer(fetchedBytes);
        textLines = await construirLinhasTexto(clonarArrayBuffer(fetchedBytes));
        statusEl.textContent = "Template carregado com sucesso.";
        gerarBtn.disabled = false;
      } catch (error) {
        statusEl.textContent = "Não foi possível carregar automaticamente. Selecione o PDF do modelo.";
        templateFallbackEl.style.display = "block";
      }
    }

    templateFallbackEl.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      const uploadedBytes = await file.arrayBuffer();
      templateBytes = clonarArrayBuffer(uploadedBytes);
      textLines = await construirLinhasTexto(clonarArrayBuffer(uploadedBytes));
      statusEl.textContent = `Template carregado manualmente: ${file.name}`;
      gerarBtn.disabled = false;
    });

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!templateBytes || !textLines) {
        alert("Template PDF não carregado.");
        return;
      }

      gerarBtn.disabled = true;
      statusEl.textContent = "Gerando PDF...";

      try {
        const data = dadosDoFormulario();
        const pdfDoc = await PDFLib.PDFDocument.load(clonarArrayBuffer(templateBytes));
        const page = pdfDoc.getPages()[0];
        const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

        escreverNoMarcador(page, font, textLines, data.nomeCompleto, {
          contextoLinha: "Nome Completo:",
          ancora: "Nome Completo:",
          linhaAbaixo: true,
          maxWidth: 350
        });
        escreverNoMarcador(page, font, textLines, data.nomeSocial, {
          contextoLinha: "Nome Social:",
          ancora: "Nome Social:",
          linhaAbaixo: true,
          maxWidth: 280
        });
        escreverNoMarcador(page, font, textLines, data.telefone, {
          contextoLinha: ["Telefone:", "Celular:"],
          ancora: ["Telefone:", "Telefone"],
          linhaAbaixo: true,
          gapY: 10,
          maxWidth: 100
        });
        escreverNoMarcador(page, font, textLines, data.celular, {
          contextoLinha: ["Telefone:", "Celular:"],
          ancora: ["Celular:", "Celular"],
          linhaAbaixo: true,
          gapY: 10,
          maxWidth: 100
        });
        const emailOk = escreverNoMarcador(page, font, textLines, data.email, {
          contextoLinha: ["E-mail:", "E-mail", "Email:", "Email"],
          ancora: ["E-mail:", "E-mail", "Email:", "Email"],
          linhaAbaixo: true,
          gapY: 10,
          maxWidth: 240
        });
        if (!emailOk) {
          const linhaEstadoCivil = encontrarLinhaPorContexto(textLines, "Estado Civil:");
          if (linhaEstadoCivil && data.email) {
            page.drawText(data.email, {
              x: linhaEstadoCivil.items[0].x + 8,
              y: linhaEstadoCivil.items[0].y + 13,
              size: 9,
              font,
              maxWidth: 240
            });
          }
        }
        escreverNoMarcador(page, font, textLines, data.estadoCivil, {
          contextoLinha: "Estado Civil:",
          ancora: "Estado Civil:",
          linhaAbaixo: true,
          maxWidth: 140
        });

        marcarCheckbox(page, font, textLines, "Primeiro emprego:", "SIM", data.primeiroEmprego === "SIM");
        marcarCheckbox(page, font, textLines, "Primeiro emprego:", "NÃO", data.primeiroEmprego === "NÃO");
        escreverNoMarcador(page, font, textLines, data.pis, {
          contextoLinha: "Primeiro emprego:",
          ancora: "Informar PIS:",
          maxWidth: 180
        });

        escreverNoMarcador(page, font, textLines, data.endereco, {
          contextoLinha: "Endereço:",
          ancora: "Endereço:",
          linhaAbaixo: true,
          maxWidth: 170
        });
        escreverNoMarcador(page, font, textLines, data.numero, {
          contextoLinha: "Endereço:",
          ancora: ["Nº", "N°", "No"],
          linhaAbaixo: true,
          maxWidth: 60
        });
        escreverNoMarcador(page, font, textLines, data.complemento, {
          contextoLinha: "Endereço:",
          ancora: "Complemento:",
          linhaAbaixo: true,
          maxWidth: 100
        });
        escreverNoMarcador(page, font, textLines, data.cep, {
          contextoLinha: "CEP:",
          ancora: "CEP:",
          linhaAbaixo: true,
          maxWidth: 80
        });
        escreverNoMarcador(page, font, textLines, data.bairro, {
          contextoLinha: "CEP:",
          ancora: "Bairro:",
          linhaAbaixo: true,
          maxWidth: 90
        });
        escreverNoMarcador(page, font, textLines, data.cidade, {
          contextoLinha: "CEP:",
          ancora: "Cidade:",
          linhaAbaixo: true,
          maxWidth: 140
        });

        marcarCheckbox(page, font, textLines, "Possui Deficiência?", "SIM", data.possuiDeficiencia === "SIM");
        marcarCheckbox(page, font, textLines, "Possui Deficiência?", "NÃO", data.possuiDeficiencia === "NÃO");
        marcarCheckbox(page, font, textLines, "FÍSICA", "FÍSICA", data.tiposDeficiencia.includes("FÍSICA"));
        marcarCheckbox(page, font, textLines, "FÍSICA", "AUDITIVA", data.tiposDeficiencia.includes("AUDITIVA"));
        marcarCheckbox(page, font, textLines, "FÍSICA", "VISUAL", data.tiposDeficiencia.includes("VISUAL"));
        marcarCheckbox(page, font, textLines, "FÍSICA", "INTELECTUAL", data.tiposDeficiencia.includes("INTELECTUAL"));
        marcarCheckbox(page, font, textLines, "FÍSICA", "MÚLTIPLA", data.tiposDeficiencia.includes("MÚLTIPLA"));

        marcarCheckbox(page, font, textLines, ["Conta Mêntore", "Conta Mentore"], "Conta", data.contaMentore);
        escreverNoMarcador(page, font, textLines, data.cpfConta, {
          contextoLinha: "Número do CPF:",
          ancora: "Número do CPF:",
          linhaAbaixo: true,
          maxWidth: 140
        });
        marcarCheckbox(page, font, textLines, "Conta Salário Bradesco", "Conta", data.contaSalarioBradesco);
        escreverNoMarcador(page, font, textLines, data.agencia, {
          contextoLinha: "Conta Salário Bradesco",
          ancora: "Agência:",
          linhaAbaixo: true,
          maxWidth: 70
        });
        escreverNoMarcador(page, font, textLines, data.contaDigito, {
          contextoLinha: "Conta Salário Bradesco",
          ancora: "Conta/Dígito:",
          linhaAbaixo: true,
          maxWidth: 80
        });

        data.dependentes.forEach((dep, idx) => {
          escreverNoMarcador(page, font, textLines, dep.nome, {
            contextoLinha: "CPF (do dependente):",
            ocorrenciaLinha: idx,
            ancora: "Nome:",
            linhaAbaixo: true,
            maxWidth: 170
          });
          escreverNoMarcador(page, font, textLines, dep.nascimento, {
            contextoLinha: "CPF (do dependente):",
            ocorrenciaLinha: idx,
            ancora: "Data de nascimento:",
            linhaAbaixo: true,
            maxWidth: 85
          });
          escreverNoMarcador(page, font, textLines, dep.cpf, {
            contextoLinha: "CPF (do dependente):",
            ocorrenciaLinha: idx,
            ancora: "CPF (do dependente):",
            linhaAbaixo: true,
            maxWidth: 110
          });
        });

        const colunaQtd = encontrarFrase(textLines, "QUANTIDADE");
        const colunaValor = encontrarFrase(textLines, ["VALOR UNITÁRIO", "VALOR UNITARIO"]);
        const qtdX = colunaQtd ? colunaQtd.x + 4 : 330;
        const valorX = colunaValor ? colunaValor.x + 4 : 430;

        escreverNaLinha(page, font, textLines, "ÔNIBUS", data.onibusQtd, { x: qtdX, maxWidth: 60 });
        escreverNaLinha(page, font, textLines, "ÔNIBUS", data.onibusValor, { x: valorX, maxWidth: 80 });
        escreverNaLinha(page, font, textLines, "METRÔ/TREM", data.metroQtd, { x: qtdX, maxWidth: 60 });
        escreverNaLinha(page, font, textLines, "METRÔ/TREM", data.metroValor, { x: valorX, maxWidth: 80 });
        escreverNaLinha(page, font, textLines, "INTERMUNICIPAL", data.interQtd, { x: qtdX, maxWidth: 60 });
        escreverNaLinha(page, font, textLines, "INTERMUNICIPAL", data.interValor, { x: valorX, maxWidth: 80 });

        const valeVaOk = marcarCheckbox(
          page,
          font,
          textLines,
          ["100% Vale Alimentação", "100 % Vale Alimentação", "VALE REFEIÇÃO/ALIMENTAÇÃO"],
          ["100%", "100 %"],
          data.valeTipo === "100_VA",
          { ocorrenciaPalavra: 0 }
        );
        const valeVrOk = marcarCheckbox(
          page,
          font,
          textLines,
          ["100% Vale Alimentação", "100 % Vale Alimentação", "VALE REFEIÇÃO/ALIMENTAÇÃO"],
          ["100%", "100 %"],
          data.valeTipo === "100_VR",
          { ocorrenciaPalavra: 1 }
        );
        const valeFlexOk = marcarCheckbox(
          page,
          font,
          textLines,
          ["100% Vale Alimentação", "100 % Vale Alimentação", "VALE REFEIÇÃO/ALIMENTAÇÃO"],
          ["Flexibilizado", "Flexibilizado (50% VR e 50% VA)"],
          data.valeTipo === "FLEX"
        );
        if (!valeVaOk) {
          marcarCheckboxPorFrase(page, font, textLines, ["100% Vale Alimentação", "100 % Vale Alimentação", "Vale Alimentação"], data.valeTipo === "100_VA");
        }
        if (!valeVrOk) {
          marcarCheckboxPorFrase(page, font, textLines, ["100% Vale Refeição", "100 % Vale Refeição", "Vale Refeição"], data.valeTipo === "100_VR");
        }
        if (!valeFlexOk) {
          marcarCheckboxPorFrase(page, font, textLines, ["Flexibilizado", "Flexibilizado (50% VR e 50% VA)"], data.valeTipo === "FLEX");
        }

        const assinaturaNomeOk = escreverAcimaDoRotulo(
          page,
          font,
          textLines,
          data.nomeCompleto,
          "NOME COMPLETO DO CANDIDATO",
          { maxWidth: 330, offsetY: 12 }
        );
        if (!assinaturaNomeOk) {
          escreverNoMarcador(page, font, textLines, data.nomeCompleto, {
            contextoLinha: "NOME COMPLETO DO CANDIDATO",
            ancora: "NOME COMPLETO DO CANDIDATO",
            maxWidth: 330,
            offsetX: 6,
            offsetY: 2
          });
        }
        escreverNoMarcador(page, font, textLines, new Date().toLocaleDateString("pt-BR"), {
          contextoLinha: "NOME COMPLETO DO CANDIDATO",
          ancora: "DATA",
          maxWidth: 90,
          offsetX: 8,
          offsetY: 2
        });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "Ficha_Cadastral_preenchida.pdf";
        link.click();
        URL.revokeObjectURL(url);

        statusEl.textContent = "PDF gerado com sucesso.";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Falha ao gerar o PDF. Veja o console do navegador.";
      } finally {
        gerarBtn.disabled = false;
      }
    });

    criarCamposDependentes();
    carregarTemplateInicial();
  </script>
</body>
</html>
